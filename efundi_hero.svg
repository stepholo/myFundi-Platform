    <path d="M13,1.5C11,1.5,9.5,3,9.5,5c0,.4.1.9.3,1.2L2.6,13.4C2.2,13.7,2,14.1,2,14.5C2,15.3,2.7,16,3.5,16c.4,0,.7-.1,1-.3L11.7,9c.3.2.8.3,1.3.3C15,9.3,16.5,7.8,16.5,6c0-.4-.1-.8-.3-1.1L13.8,7.3l-1.8-.5L11.5,5l2.4-2.4C13.7,2.3,13.4,1.5,13,1.5Z" fill="white"/>
  </g>
