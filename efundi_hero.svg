  <!-- ── CONNECTING DOTS (UI to map) ── -->
  <line x1="196" y1="142" x2="264" y2="130" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.6"/>
  <line x1="420" y1="145" x2="370" y2="130" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.6"/>

  <!-- ── TAGLINE OVERLAY (hero text area hint) ── -->
  <rect x="48" y="170" width="200" height="120" rx="18" fill="url(#bgG)" opacity="0.7"/>
  <text x="68" y="202" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#64748B" letter-spacing="2">NAIROBI'S #1 SERVICE APP</text>
  <text x="64" y="228" font-family="'Segoe UI',sans-serif" font-size="22" font-weight="900" fill="#1B2D5E">Find a trusted</text>
  <text x="64" y="254" font-family="'Segoe UI',sans-serif" font-size="22" font-weight="900" fill="#E8501A">Fundi near you</text>
