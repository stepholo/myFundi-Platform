  <line x1="80"  y1="270" x2="560" y2="270" stroke="#C5CFE8" stroke-width="2.5" stroke-dasharray="8,5"/>
  <line x1="320" y1="60"  x2="320" y2="480" stroke="#C5CFE8" stroke-width="2.5" stroke-dasharray="8,5"/>
  <line x1="130" y1="130" x2="510" y2="410" stroke="#C5CFE8" stroke-width="1.5" stroke-dasharray="5,6" opacity="0.6"/>
  <line x1="510" y1="130" x2="130" y2="410" stroke="#C5CFE8" stroke-width="1.5" stroke-dasharray="5,6" opacity="0.6"/>

