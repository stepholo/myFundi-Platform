  <rect x="730" y="330" width="24" height="88" rx="10" fill="#374151"/>
  <!-- Boot left -->
  <path d="M690 410 Q690 426 700 426 L724 426 Q728 426 728 416 L728 410 Z" fill="#1E293B"/>
  <!-- Boot right -->
  <path d="M724 410 Q724 426 734 426 L758 426 Q762 426 762 416 L762 410 Z" fill="#1E293B"/>

  <!-- BODY (work jacket) -->
