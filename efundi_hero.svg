  <ellipse cx="732" cy="183" rx="5.5" ry="6" fill="white"/>
  <circle cx="710" cy="185" r="3.5" fill="#1B2D5E"/>
  <circle cx="734" cy="185" r="3.5" fill="#1B2D5E"/>
  <!-- Eye shine -->
