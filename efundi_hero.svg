    <line x1="477" y1="360" x2="477" y2="367" stroke="#E8501A" stroke-width="2" stroke-linecap="round"/>
    <line x1="477" y1="367" x2="483" y2="370" stroke="#E8501A" stroke-width="2" stroke-linecap="round"/>
