  <circle cx="218" cy="185" r="20" fill="#E8501A" opacity="0.12"/>
  <circle cx="218" cy="185" r="11" fill="#E8501A" opacity="0.85"/>
  <circle cx="218" cy="185" r="5"  fill="white"/>
  <line x1="224" y1="191" x2="305" y2="243" stroke="#E8501A" stroke-width="1.8" stroke-dasharray="5,4" opacity="0.45"/>

  <!-- Fundi B -->
  <circle cx="402" cy="168" r="20" fill="#E8501A" opacity="0.12"/>
  <circle cx="402" cy="168" r="11" fill="#E8501A" opacity="0.85"/>
  <circle cx="402" cy="168" r="5"  fill="white"/>
  <line x1="396" y1="174" x2="330" y2="242" stroke="#E8501A" stroke-width="1.8" stroke-dasharray="5,4" opacity="0.45"/>

  <!-- Fundi C -->
  <circle cx="196" cy="350" r="20" fill="#E8501A" opacity="0.12"/>
  <circle cx="196" cy="350" r="11" fill="#E8501A" opacity="0.85"/>
  <circle cx="196" cy="350" r="5"  fill="white"/>
  <line x1="204" y1="344" x2="306" y2="283" stroke="#E8501A" stroke-width="1.8" stroke-dasharray="5,4" opacity="0.45"/>

  <!-- Fundi D (further out) -->
  <circle cx="430" cy="350" r="16" fill="#2E4380" opacity="0.12"/>
  <circle cx="430" cy="350" r="9"  fill="#2E4380" opacity="0.75"/>
  <circle cx="430" cy="350" r="4"  fill="white"/>

