    <rect x="-8" y="-8" width="16" height="10" rx="4" fill="#6B7280"/>
    <rect x="-4" y="-6" width="4" height="6" rx="2" fill="#374151"/>
    <rect x="0"  y="-6" width="4" height="6" rx="2" fill="#374151"/>
