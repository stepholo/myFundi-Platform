<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF3FF"/>
      <stop offset="100%" stop-color="#E4EAF8"/>
    </linearGradient>
    <linearGradient id="pinG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9A3C"/>
      <stop offset="100%" stop-color="#E8501A"/>
    </linearGradient>
    <linearGradient id="charBodyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2D5E"/>
      <stop offset="100%" stop-color="#0F1D3E"/>
    </linearGradient>
    <linearGradient id="vestG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9A3C"/>
      <stop offset="100%" stop-color="#E8501A"/>
    </linearGradient>
    <linearGradient id="groundG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D1D9F0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#B8C4E8" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="fShadow" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1B2D5E" flood-opacity="0.13"/>
    </filter>
    <filter id="pinShadow" x="-40%" y="-20%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#E8501A" flood-opacity="0.40"/>
    </filter>
    <filter id="glowPin">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="mapDots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="1.2" fill="#C5CDE8"/>
    </pattern>
  </defs>

  <!-- ── BG ── -->
  <rect width="900" height="520" fill="url(#bgG)"/>
  <rect width="900" height="520" fill="url(#mapDots)" opacity="0.7"/>

  <!-- ── NAIROBI SKYLINE SILHOUETTE ── -->
  <g opacity="0.065" fill="#1B2D5E">
    <!-- left cluster -->
    <rect x="0"   y="370" width="38" height="150"/>
    <rect x="32"  y="345" width="28" height="175"/>
    <rect x="54"  y="385" width="22" height="135"/>
    <rect x="70"  y="352" width="42" height="168"/>
    <!-- KICC-style cylinder -->
    <rect x="106" y="298" width="26" height="222" rx="13 13 0 0"/>
    <ellipse cx="119" cy="298" rx="13" ry="5"/>
    <rect x="126" y="368" width="36" height="152"/>
    <rect x="156" y="385" width="28" height="135"/>
    <rect x="178" y="350" width="44" height="170"/>
    <rect x="216" y="370" width="24" height="150"/>
    <rect x="234" y="390" width="38" height="130"/>
    <!-- right cluster -->
    <rect x="560" y="375" width="34" height="145"/>
    <rect x="588" y="355" width="30" height="165"/>
    <rect x="612" y="385" width="26" height="135"/>
    <rect x="730" y="360" width="40" height="160"/>
    <rect x="764" y="378" width="28" height="142"/>
    <rect x="786" y="348" width="36" height="172"/>
    <rect x="820" y="370" width="30" height="150"/>
    <rect x="845" y="390" width="32" height="130"/>
    <rect x="870" y="368" width="30" height="152"/>
  </g>

  <!-- ── MAP AREA (left ~55%) ── -->
