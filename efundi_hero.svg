  <circle cx="320" cy="270" r="210" fill="none" stroke="#E8501A" stroke-width="1"   opacity="0.06"/>
  <circle cx="320" cy="270" r="165" fill="none" stroke="#E8501A" stroke-width="1.2" opacity="0.09"/>
  <circle cx="320" cy="270" r="120" fill="none" stroke="#E8501A" stroke-width="1.5" opacity="0.13"/>
  <circle cx="320" cy="270" r="75"  fill="none" stroke="#E8501A" stroke-width="2"   opacity="0.20"/>
  <circle cx="320" cy="270" r="35"  fill="none" stroke="#E8501A" stroke-width="2"   opacity="0.30"/>

