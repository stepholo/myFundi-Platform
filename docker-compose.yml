services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-efundi_db}
      POSTGRES_USER: ${DB_USER:-efundi_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-efundi_qw12ERty!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-efundi_user} -d ${DB_NAME:-efundi_db}"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: efundi_app/Dockerfile
    restart: unless-stopped
    env_file: efundi_app/.env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/1
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
      - ./static:/app/static
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn efundi_app.wsgi:application --bind 0.0.0.0:8000"

  celery:
    build:
      context: .
      dockerfile: efundi_app/Dockerfile
    restart: unless-stopped
    env_file: efundi_app/.env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/1
    volumes:
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A efundi_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
