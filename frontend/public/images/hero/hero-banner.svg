<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="eFundi marketing banner">
  <defs>
    <linearGradient id="hbBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2D5E"/><stop offset="100%" stop-color="#0F1D3E"/>
    </linearGradient>
    <linearGradient id="hbPin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9A3C"/><stop offset="100%" stop-color="#E8501A"/>
    </linearGradient>
    <linearGradient id="hbBtn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF9A3C"/><stop offset="100%" stop-color="#E8501A"/>
    </linearGradient>
    <pattern id="hbDots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="17" cy="17" r="1.3" fill="#FFFFFF" opacity="0.08"/>
    </pattern>
    <filter id="hbPinShadow" x="-40%" y="-30%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#E8501A" flood-opacity="0.45"/>
    </filter>
    <filter id="hbCard" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="0" fill="url(#hbBg)"/>
  <rect width="1200" height="420" fill="url(#hbDots)"/>
  <!-- soft glow right -->
  <circle cx="980" cy="210" r="260" fill="#E8501A" opacity="0.10"/>

  <!-- LOGO mark -->
  <g transform="translate(80 56)">
    <path d="M22 0 C10 0 0 10 0 22 C0 35 18 50 22 54 C26 50 44 35 44 22 C44 10 34 0 22 0 Z" fill="url(#hbPin)"/>
    <circle cx="22" cy="21" r="11" fill="#FFFFFF" opacity="0.20"/>
    <g transform="translate(13 11) scale(0.8)"><path d="M15.5 2 C13 2 11 4 11 6.5 C11 7 11.1 7.5 11.3 7.9 L2.3 16.9 C2.1 17.1 2 17.5 2 18 C2 19.1 2.9 20 4 20 C4.5 20 4.8 19.9 5.1 19.7 L14.1 10.7 C14.5 10.9 15 11 15.5 11 C18 11 20 9 20 6.5 C20 6 19.9 5.5 19.7 5.1 L17 7.8 L15 7.2 L14.4 5.2 L17.1 2.5 C16.6 2.2 16.1 2 15.5 2 Z" fill="#FFFFFF"/></g>
    <text x="58" y="38" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="40"><tspan fill="#FF9A3C">e</tspan><tspan fill="#FFFFFF">Fundi</tspan></text>
  </g>

  <!-- Headline -->
  <text x="80" y="200" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="56" fill="#FFFFFF">Your Fundi,</text>
  <text x="80" y="262" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="56" fill="#FF9A3C">On Demand.</text>
  <text x="82" y="300" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="20" fill="#A9B4D4">Verified plumbers, electricians, carpenters &amp; cleaners — booked in minutes.</text>

  <!-- CTA button -->
  <g filter="url(#hbCard)">
    <rect x="82" y="324" width="190" height="54" rx="27" fill="url(#hbBtn)"/>
  </g>
  <text x="177" y="358" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="20" fill="#FFFFFF">Book a Fundi</text>

  <!-- RIGHT: big pin holding service chips -->
  <g filter="url(#hbPinShadow)" transform="translate(880 70)">
    <path d="M110 0 C61 0 22 39 22 88 C22 150 96 215 110 230 C124 215 198 150 198 88 C198 39 159 0 110 0 Z" fill="url(#hbPin)"/>
    <circle cx="110" cy="84" r="58" fill="#FFFFFF"/>
  </g>
  <!-- wrench inside pin -->
  <g transform="translate(960 118) scale(2.6)"><path d="M15.5 2 C13 2 11 4 11 6.5 C11 7 11.1 7.5 11.3 7.9 L2.3 16.9 C2.1 17.1 2 17.5 2 18 C2 19.1 2.9 20 4 20 C4.5 20 4.8 19.9 5.1 19.7 L14.1 10.7 C14.5 10.9 15 11 15.5 11 C18 11 20 9 20 6.5 C20 6 19.9 5.5 19.7 5.1 L17 7.8 L15 7.2 L14.4 5.2 L17.1 2.5 C16.6 2.2 16.1 2 15.5 2 Z" fill="#E8501A"/></g>

  <!-- floating service chips -->
  <g filter="url(#hbCard)">
    <rect x="724" y="120" width="64" height="64" rx="18" fill="#DBEAFE"/>
  </g>
  <rect x="740" y="148" width="22" height="9" rx="4.5" fill="#3B82F6"/><rect x="757" y="138" width="9" height="26" rx="4.5" fill="#2563EB"/>

  <g filter="url(#hbCard)">
    <rect x="704" y="248" width="64" height="64" rx="18" fill="#FEF9C3"/>
  </g>
  <path d="M742 264 L728 286 H737 L734 304 L750 280 H741 Z" fill="#F59E0B" stroke="#D97706" stroke-width="1.5" stroke-linejoin="round"/>

  <g filter="url(#hbCard)">
    <rect x="1108" y="130" width="64" height="64" rx="18" fill="#DCFCE7"/>
  </g>
  <g transform="rotate(38 1140 162)"><rect x="1136" y="150" width="7" height="30" rx="3.5" fill="#65A30D"/><rect x="1127" y="144" width="24" height="11" rx="4" fill="#16A34A"/></g>

  <g filter="url(#hbCard)">
    <rect x="1112" y="252" width="64" height="64" rx="18" fill="#FAE8FF"/>
  </g>
  <rect x="1137" y="278" width="16" height="22" rx="4" fill="#A855F7"/><rect x="1140" y="270" width="9" height="10" rx="2.5" fill="#9333EA"/>
</svg>
