<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="eFundi Icon">
  <defs>
    <linearGradient id="bg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A3C"/>
      <stop offset="100%" style="stop-color:#E8501A"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-10%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#C43D0F" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded square badge background -->
  <rect x="4" y="4" width="72" height="72" rx="18" fill="url(#bg)" filter="url(#s)"/>

  <!-- White "eF" monogram -->
  <text
    x="40" y="53"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="38"
    fill="white"
    text-anchor="middle"
    letter-spacing="-2">eF</text>

  <!-- Small wrench accent line -->
  <line x1="22" y1="60" x2="58" y2="60" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
</svg>
